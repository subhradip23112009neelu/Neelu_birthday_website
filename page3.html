
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome Neelam</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd6e8,#fff5fa,#ffffff);
text-align:center;
position:relative;
}

.float{
position:absolute;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

.title{
font-size:55px;
color:#ff4f96;
text-shadow:0 0 20px pink;
animation:fadeIn 2s;
}

.subtitle{
font-size:22px;
margin-top:20px;
max-width:700px;
padding:0 20px;
color:#666;
opacity:0;
animation:fadeIn 2s forwards;
animation-delay:2s;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

button{
margin-top:40px;
padding:16px 35px;
border:none;
border-radius:40px;
background:#ff69b4;
color:white;
font-size:20px;
cursor:pointer;
display:none;
box-shadow:0 0 20px pink;
}

button:hover{
transform:scale(1.05);
}

.butterfly{
position:absolute;
font-size:35px;
animation:fly 15s linear infinite;
}

@keyframes fly{
0%{
left:-50px;
top:20%;
}
100%{
left:110%;
top:40%;
}
}

</style>
</head>

<body>

<div class="butterfly">🦋</div>
<div class="butterfly" style="animation-delay:5s;">🦋</div>
<div class="butterfly" style="animation-delay:10s;">🦋</div>

<h1 class="title">
Welcome MY PRINCESS Neelam 💖
</h1>

<p class="subtitle">
Today is all about celebrating the amazing person you are ✨
</p>

<button id="nextBtn"
onclick="location.href='page4.html'">
📸 Open Memory Wall
</button>

<script>

/* Show Button After Message */

setTimeout(()=>{
document.getElementById("nextBtn").style.display="inline-block";
},4500);

/* Hearts */

function heart(){

let e=document.createElement("div");

e.className="float";
e.innerHTML="❤️";

e.style.left=Math.random()*100+"vw";
e.style.bottom="-50px";

e.style.fontSize=
(20+Math.random()*20)+"px";

e.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),10000);

}

setInterval(heart,300);

/* Flowers */

const flowers=[
"🌹","🌸","🌺","🌷","💐"
];

function flower(){

let e=document.createElement("div");

e.className="float";

e.innerHTML=
flowers[Math.floor(Math.random()*flowers.length)];

e.style.left=Math.random()*100+"vw";
e.style.bottom="-50px";

e.style.fontSize="30px";

e.style.animationDuration=
(6+Math.random()*4)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),10000);

}

setInterval(flower,500);

/* Sparkles */

function sparkle(){

let e=document.createElement("div");

e.innerHTML="✨";

e.style.position="absolute";

e.style.left=Math.random()*100+"vw";
e.style.top=Math.random()*100+"vh";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},2000);

}

setInterval(sparkle,200);

</script>

</body>
</html>
