
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Special Letter For Neelam</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ffd6e8,#fff0f7,#ffffff);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Floating Hearts */

.float{
position:absolute;
pointer-events:none;
animation:floatUp linear forwards;
z-index:1;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Typewriter */

.typewriter{
white-space:pre-line;
border-right:3px solid #ff4f96;
display:inline-block;
animation:blink .8s infinite;
}

.cursor-hide{
border-right:none;
animation:none;
}

@keyframes blink{
50%{
border-color:transparent;
}
}

/* Intro Screen */

#intro{
text-align:center;
padding:20px;
z-index:2;
}

#title{
font-size:55px;
color:#ff4f96;
text-shadow:0 0 20px pink;
}

#introText{
font-size:22px;
margin-top:20px;
color:#555;
display:block;
min-height:80px;
}

.openBtn{
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff69b4;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px pink;
display:none;
transition:.3s;
}

.openBtn:hover{
transform:scale(1.05);
}

/* Letter Page */

#letterPage{
display:none;
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,.35);
justify-content:center;
align-items:center;
z-index:5;
}

.parchment{
width:85%;
max-width:900px;
max-height:85vh;
overflow-y:auto;
padding:50px;
border:12px solid #8b5a2b;
border-radius:20px;
background:linear-gradient(#f8ecc2,#e8d4a2);
box-shadow:
0 0 40px rgba(0,0,0,.5),
0 0 30px gold;
transform:scale(0);
animation:openScroll 1.2s forwards;
}

@keyframes openScroll{
100%{
transform:scale(1);
}
}

#letterTitle{
font-family:'Great Vibes',cursive;
font-size:60px;
text-align:center;
color:#7a3d00;
margin-bottom:30px;
display:block;
min-height:80px;
}

#letterContent{
font-size:20px;
line-height:1.9;
color:#4a2f13;
display:block;
min-height:350px;
}

.signature{
margin-top:30px;
text-align:right;
font-family:'Great Vibes',cursive;
font-size:42px;
color:#7a3d00;
min-height:60px;
}

.memoryBtn{
margin:30px auto 0;
display:none;
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff4f96;
color:white;
font-size:20px;
cursor:pointer;
box-shadow:0 0 20px pink;
}

.memoryBtn:hover{
transform:scale(1.05);
}

/* Candles */

.candle{
position:absolute;
font-size:45px;
animation:flicker 1s infinite alternate;
}

.left{
left:8%;
bottom:10%;
}

.right{
right:8%;
bottom:10%;
}

@keyframes flicker{
from{
transform:scale(1);
}
to{
transform:scale(1.1);
}
}

</style>
</head>

<body>

<!-- INTRO PAGE -->

<div id="intro">

<h1 id="title" class="typewriter"></h1>

<p id="introText" class="typewriter"></p>

<button class="openBtn" id="openBtn" onclick="openLetter()">
📜 Open The Letter
</button>

</div>

<!-- LETTER PAGE -->

<div id="letterPage">

<div class="candle left">🕯️</div>
<div class="candle right">🕯️</div>

<div class="parchment">

<h2 id="letterTitle" class="typewriter"></h2>

<p id="letterContent" class="typewriter"></p>

<div class="signature typewriter" id="signature"></div>

<button class="memoryBtn"
id="memoryBtn"
onclick="location.href='page5.html'">
📸 Enter The Memory Wall
</button>

</div>

</div>

<script>

/* TYPEWRITER FUNCTION */

function typeWriter(element,text,speed,callback){

let i=0;

element.innerHTML="";

function typing(){

if(i<text.length){

element.innerHTML+=text.charAt(i);
i++;

setTimeout(typing,speed);

}else{

element.classList.add("cursor-hide");

if(callback) callback();

}

}

typing();

}

/* INTRO */

const titleText =
"💌 Before Going To The Memory Wall...";

const introText =
"There is something important I want you to read first.";

typeWriter(
document.getElementById("title"),
titleText,
60,
()=>{

typeWriter(
document.getElementById("introText"),
introText,
40,
()=>{

document.getElementById("openBtn").style.display="inline-block";

});

});

/* OPEN LETTER */

function openLetter(){

document.getElementById("intro").style.display="none";
document.getElementById("letterPage").style.display="flex";

const letterTitle =
"My Dearest Neelam ❤️";

const letterText =

`Before you look back at all our memories,
I want you to know something.

You are one of the most beautiful chapters of my life.
Not because of how you look,
but because of how you make people feel around you.

Your smile brings comfort.
Your presence brings peace.
Your kindness leaves an impression that words can never fully describe.

Today is your special day,
and while gifts may fade and time may pass,
some feelings remain unchanged.

Thank you for being yourself.
Thank you for existing.
Thank you for creating memories worth remembering.

No matter how many photos appear in the next section,
none of them can truly capture how special you are.

So before entering the Memory Wall...

Remember this:

❤️ You are appreciated.
❤️ You are valued.
❤️ You are deeply loved.

Happy Birthday Neelam ❤️`;

typeWriter(
document.getElementById("letterTitle"),
letterTitle,
70,
()=>{

typeWriter(
document.getElementById("letterContent"),
letterText,
22,
()=>{

typeWriter(
document.getElementById("signature"),
"— Subhradip",
100,
()=>{

document.getElementById("memoryBtn").style.display="block";

});

});

});

}

/* FLOATING HEARTS */

function heart(){

let h=document.createElement("div");

h.className="float";
h.innerHTML="💖";

h.style.left=Math.random()*100+"vw";
h.style.bottom="-50px";

h.style.fontSize=
(20+Math.random()*25)+"px";

h.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{
h.remove();
},10000);

}

setInterval(heart,300);

/* SPARKLES */

function sparkle(){

let s=document.createElement("div");

s.innerHTML="✨";

s.style.position="absolute";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
s.style.fontSize="20px";

document.body.appendChild(s);

setTimeout(()=>{
s.remove();
},2000);

}

setInterval(sparkle,250);

</script>

</body>
</html>
