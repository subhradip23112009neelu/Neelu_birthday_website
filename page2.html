
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Save The Date</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd6e8,#fff5fa,#ffffff);
position:relative;
text-align:center;
}

/* Floating Objects */

.float{
position:absolute;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}

/* Question */

#question{
font-size:42px;
color:#ff4f96;
opacity:0;
transition:1s;
}

/* Buttons */

button{
padding:14px 30px;
border:none;
border-radius:30px;
background:#ff69b4;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* Calendar */

#calendar{
display:none;
margin-top:20px;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 0 30px rgba(255,105,180,.3);
animation:zoomIn 1s;
}

@keyframes zoomIn{
from{
transform:scale(.5);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

.month{
font-size:24px;
font-weight:600;
color:#ff4f96;
margin-bottom:20px;
}

.days{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
width:320px;
}

.days div{
padding:10px;
background:#ffeaf3;
border-radius:50%;
}

.special{
background:#ff69b4 !important;
color:white;
font-weight:bold;
box-shadow:0 0 25px pink;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.2);}
100%{transform:scale(1);}
}

#msg1,#msg2,#continueBtn{
display:none;
margin-top:20px;
color:#ff4f96;
font-size:20px;
}

</style>
</head>

<body>

<h1 id="question">
Did You Save The Date? 💖
</h1>

<button id="showBtn"
style="display:none;"
onclick="showCalendar()">
📅 Show Me
</button>

<div id="calendar">

<div class="month">
November 2026
</div>

<div class="days">

<div>1</div>
<div>2</div>
<div>3</div>
<div>4</div>
<div>5</div>
<div>6</div>
<div>7</div>

<div>8</div>
<div>9</div>
<div>10</div>
<div>11</div>
<div>12</div>
<div>13</div>
<div>14</div>

<div>15</div>
<div>16</div>
<div>17</div>
<div>18</div>
<div>19</div>
<div>20</div>
<div>21</div>

<div>22</div>
<div class="special">23</div>
<div>24</div>
<div>25</div>
<div>26</div>
<div>27</div>
<div>28</div>

<div>29</div>
<div>30</div>

</div>

</div>

<p id="msg1">
Because this isn't just another day...
</p>

<p id="msg2">
It's a day worth celebrating ✨
</p>

<button id="continueBtn"
onclick="location.href='page3.html'">
🌸 Continue The Journey
</button>

<script>

/* Page Sequence */

window.onload=function(){

setTimeout(()=>{
document.getElementById("question").style.opacity="1";
},500);

setTimeout(()=>{
document.getElementById("showBtn").style.display="block";
},3000);

}

function showCalendar(){

document.getElementById("showBtn").style.display="none";

document.getElementById("calendar").style.display="block";

setTimeout(()=>{
document.getElementById("msg1").style.display="block";
},2000);

setTimeout(()=>{
document.getElementById("msg2").style.display="block";
},4000);

setTimeout(()=>{
document.getElementById("continueBtn").style.display="block";
},6000);

}

/* Hearts */

function heart(){

let e=document.createElement("div");

e.className="float";
e.innerHTML="❤️";

e.style.left=Math.random()*100+"vw";
e.style.bottom="-50px";

e.style.fontSize=
(20+Math.random()*20)+"px";

e.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),10000);

}

setInterval(heart,300);

/* Flowers */

const flowers=["🌹","🌸","🌺","🌷"];

function flower(){

let e=document.createElement("div");

e.className="float";

e.innerHTML=
flowers[Math.floor(Math.random()*flowers.length)];

e.style.left=Math.random()*100+"vw";
e.style.bottom="-50px";

e.style.fontSize="28px";

e.style.animationDuration=
(6+Math.random()*4)+"s";

document.body.appendChild(e);

setTimeout(()=>e.remove(),10000);

}

setInterval(flower,500);

/* Sparkles */

function sparkle(){

let e=document.createElement("div");

e.innerHTML="✨";

e.style.position="absolute";
e.style.left=Math.random()*100+"vw";
e.style.top=Math.random()*100+"vh";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},2000);

}

setInterval(sparkle,200);

</script>

</body>
</html>
