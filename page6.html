<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page 6 - Why You Are So Special</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#fff5f8,#ffd9e8,#fff);min-height:100vh}
.hero{text-align:center;padding:60px 20px}
.hero h1{color:#ff4f96}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;padding:25px}
.card{background:#fff;padding:18px;border-radius:18px;cursor:pointer;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.box{max-width:800px;margin:20px auto;background:#fff;padding:20px;border-radius:20px}
.btn{display:block;margin:20px auto;padding:14px 28px;border:none;border-radius:30px;background:#ff4f96;color:#fff}
</style>
</head>
<body>
<div class="hero">
<h1>💖 Why You Are So Special 💖</h1>
<p>Click the cards to reveal messages.</p>
</div>
<div class="cards" id="cards"></div>
<div class="box">
<h2 id="title">Click a card</h2>
<p id="msg">Message appears here.</p>
</div>
<div class="box" id="secret" style="display:none">
<h2>🌹 Secret Letter</h2>
<p>Dear Neelam,<br><br>This is a placeholder secret letter.<br><br>— Subhradip ❤️</p>
</div>
<button class="btn" onclick="document.getElementById('secret').style.display='block'">🔓 Unlock Secret Letter</button>
<button class="btn" onclick="location.href='page7.html'">🎂 Continue To Birthday Surprise</button>

<script>
const data=["❤️ Your Smile","🌸 Your Kindness","🦋 Your Presence","✨ Your Innocence","🌹 Your Eyes","💌 Your Caring Nature","😊 Your Laugh","⭐ Your Personality","🌷 Your Sweetness","💕 Your Support","🎀 Your Style","🌙 Your Calmness","💎 Your Uniqueness","☀️ Your Positivity","🌺 Your Warm Heart","🩷 Your Beauty","🌟 Your Strength","🎶 Your Voice","💖 Everything About You","🎂 Birthday Girl"];
const c=document.getElementById('cards');
data.forEach((x,i)=>{
let d=document.createElement('div');
d.className='card';
d.textContent=x;
d.onclick=()=>{document.getElementById('title').textContent=x;document.getElementById('msg').textContent='Placeholder message '+(i+1)+'. Replace with your own memory.';}
c.appendChild(d);
});
</script>
</body>
</html>
