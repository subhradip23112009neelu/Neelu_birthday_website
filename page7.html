<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Balloon Wishes For Neelam 🎈</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:linear-gradient(180deg,#8fd3ff,#d7f3ff,#ffffff);
}

.sky{
position:relative;
width:100%;
height:100vh;
overflow:hidden;
}

h1{
position:absolute;
top:30px;
width:100%;
text-align:center;
font-size:3rem;
color:white;
text-shadow:0 0 20px hotpink;
z-index:100;
}

.subtitle{
position:absolute;
top:90px;
width:100%;
text-align:center;
font-size:1.2rem;
color:white;
z-index:100;
}

.balloon{
position:absolute;
width:90px;
height:110px;
border-radius:50%;
cursor:pointer;
animation:floatUp linear infinite;
box-shadow:0 0 25px rgba(255,255,255,0.8);
}

.balloon::after{
content:'';
position:absolute;
width:2px;
height:80px;
background:white;
left:50%;
top:100%;
}

@keyframes floatUp{
0%{
transform:translateY(120vh);
}
100%{
transform:translateY(-150vh);
}
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
background:rgba(255,255,255,0.95);
padding:25px;
border-radius:25px;
width:85%;
max-width:450px;
text-align:center;
box-shadow:0 0 30px hotpink;
transition:.4s;
z-index:999;
}

.popup.show{
transform:translate(-50%,-50%) scale(1);
}

.popup h2{
color:#ff1493;
margin-bottom:15px;
}

.popup button{
margin-top:15px;
padding:10px 25px;
border:none;
background:#ff1493;
color:white;
border-radius:30px;
cursor:pointer;
}

#counter{
position:absolute;
bottom:25px;
left:50%;
transform:translateX(-50%);
background:rgba(255,255,255,0.7);
padding:12px 25px;
border-radius:30px;
font-size:1.2rem;
font-weight:bold;
}

#nextBtn{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
padding:15px 30px;
font-size:1.1rem;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#ff1493,#ff69b4);
color:white;
cursor:pointer;
display:none;
box-shadow:0 0 20px hotpink;
}

.sparkle{
position:absolute;
color:white;
animation:twinkle 3s infinite;
}

@keyframes twinkle{
0%,100%{opacity:0.3;}
50%{opacity:1;}
}

.golden{
border:4px solid gold;
box-shadow:0 0 40px gold;
}
</style>
</head>

<body>

<div class="sky">

<h1>🎈 Balloon Wishes For Neelam 🎈</h1>
<p class="subtitle">Pop balloons to reveal special wishes ❤️</p>

<button id="nextBtn">
🎂 Go To Cake Ceremony 🍰
</button>

<div id="counter">Balloons Popped: 0 / 10</div>

</div>

<div class="popup" id="popup">
<h2>🎁 Surprise Wish</h2>
<p id="wishText"></p>
<button onclick="closePopup()">Close</button>
</div>

<script>

const wishes = [
"Your smile can brighten even the darkest day ❤️",
"Thank you for being such a wonderful friend 🌸",
"May happiness always find its way to you ✨",
"You deserve all the love and success in the world 🌹",
"Never stop being the amazing person you are 💖",
"Every moment with you becomes a beautiful memory 📸",
"You are one of the most precious gifts in life 🎁",
"Keep shining like the brightest star ⭐",
"May your dreams come true one by one 🌈",
"Happy Birthday Neelam ❤️"
];

let popped=0;

const sky=document.querySelector('.sky');

for(let i=0;i<20;i++){

let balloon=document.createElement('div');
balloon.classList.add('balloon');

let colors=[
'#ff4d6d',
'#ff9f1c',
'#06d6a0',
'#118ab2',
'#9b5de5',
'#f15bb5'
];

balloon.style.background=
colors[Math.floor(Math.random()*colors.length)];

balloon.style.left=Math.random()*95+'%';
balloon.style.animationDuration=
(10+Math.random()*10)+'s';

balloon.onclick=function(){

this.remove();

let wish=
wishes[Math.floor(Math.random()*wishes.length)];

showWish(wish);

popped++;

document.getElementById('counter').innerHTML=
'Balloons Popped: '+popped+' / 10';

if(popped>=10){
document.getElementById('nextBtn').style.display='block';
}
};

sky.appendChild(balloon);
}

let golden=document.createElement('div');
golden.classList.add('balloon');
golden.classList.add('golden');
golden.style.background='gold';
golden.style.left='50%';
golden.style.animationDuration='14s';

golden.onclick=function(){

this.remove();

showWish(
"🎉 You found the Golden Balloon!<br><br>A truly special person deserves a truly special surprise ❤️<br><br>🌹✨🎊"
);

createConfetti();
};

sky.appendChild(golden);

function showWish(text){
document.getElementById('wishText').innerHTML=text;
document.getElementById('popup').classList.add('show');
}

function closePopup(){
document.getElementById('popup').classList.remove('show');
}

function createConfetti(){

for(let i=0;i<100;i++){

let conf=document.createElement('div');

conf.innerHTML='❤️';
conf.style.position='fixed';
conf.style.left=Math.random()*100+'vw';
conf.style.top='-20px';
conf.style.fontSize=(15+Math.random()*25)+'px';
conf.style.zIndex='9999';

document.body.appendChild(conf);

let speed=3+Math.random()*5;

let pos=-20;

let fall=setInterval(()=>{

pos+=speed;

conf.style.top=pos+'px';

if(pos>window.innerHeight){
clearInterval(fall);
conf.remove();
}

},20);
}
}

for(let i=0;i<50;i++){

let star=document.createElement('div');

star.classList.add('sparkle');

star.innerHTML='✨';

star.style.left=Math.random()*100+'%';
star.style.top=Math.random()*100+'%';

star.style.fontSize=
(10+Math.random()*20)+'px';

sky.appendChild(star);
}

document.getElementById('nextBtn').onclick=function(){

alert(
"🎂 Opening Cake Ceremony Section..."
);

/* Replace with:
window.location.href='cake.html';
*/

};

</script>

</body>
</html>
