
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memory Timeline</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e8,#fff5fa,#ffffff);
min-height:100vh;
overflow-x:hidden;
}

.container{
display:flex;
min-height:100vh;
}

/* Timeline */

.timeline{
width:30%;
padding:40px;
border-right:3px solid pink;
}

.timeline h1{
color:#ff4f96;
margin-bottom:30px;
}

.event{
padding:15px;
margin:15px 0;
background:white;
border-radius:15px;
cursor:pointer;
box-shadow:0 0 10px rgba(255,105,180,.2);
transition:.3s;
}

.event:hover{
transform:scale(1.05);
}

/* Memory Area */

.memory{
width:70%;
padding:40px;
}

#memoryCard{
display:none;
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 0 20px rgba(255,105,180,.3);
}

#memoryTitle{
font-size:35px;
color:#ff4f96;
margin-bottom:15px;
}

#memoryDate{
color:#888;
margin-bottom:20px;
}

#memoryNote{
font-size:18px;
line-height:1.8;
min-height:120px;
white-space:pre-line;
}

.photos{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:25px;
}

.photos img{
width:220px;
height:260px;
object-fit:cover;
border-radius:15px;
box-shadow:0 0 15px pink;
}

.nextBtn{
margin-top:40px;
padding:15px 35px;
background:#ff4f96;
color:white;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="timeline">

<h1>💖 Memory Timeline</h1>

<div class="event"
onclick="showMemory('m1')">
🌸 First Meeting
</div>

<div class="event"
onclick="showMemory('m2')">
❤️ First Special Day
</div>

<div class="event"
onclick="showMemory('m3')">
✨ Favorite Memory
</div>

<div class="event"
onclick="showMemory('m4')">
🌹 Today
</div>

</div>

<div class="memory">

<div id="memoryCard">

<div id="memoryTitle"></div>

<div id="memoryDate"></div>

<p id="memoryNote"></p>

<div class="photos"
id="memoryPhotos">
</div>

<button class="nextBtn"
onclick="location.href='page6.html'">
🎂 Continue Journey
</button>

</div>

</div>

</div>

<script>

const memories={

m1:{
title:"The Beginning ❤️",
date:"23 November 2024",
note:"This was the beginning of a beautiful story. Every journey starts somewhere, and this memory will always stay special.",
photos:[
"photo1.jpg",
"photo2.jpg"
]
},

m2:{
title:"A Day To Remember 🌸",
date:"14 February 2025",
note:"One of the happiest days. A memory filled with smiles and moments worth keeping forever.",
photos:[
"photo3.jpg",
"photo4.jpg"
]
},

m3:{
title:"Our Favorite Moment ✨",
date:"10 August 2025",
note:"A memory that always brings a smile whenever I think about it.",
photos:[
"photo5.jpg"
]
},

m4:{
title:"Happy Birthday Neelam 🌹",
date:"23 November 2026",
note:"Every memory brought us here. Today is all about celebrating you and the happiness you bring.",
photos:[
"photo6.jpg"
]
}

};

function typeWriter(element,text,speed){

element.innerHTML="";

let i=0;

function type(){

if(i<text.length){

element.innerHTML+=text.charAt(i);

i++;

setTimeout(type,speed);

}

}

type();

}

function showMemory(id){

const m=memories[id];

document.getElementById("memoryCard").style.display="block";

document.getElementById("memoryTitle").innerHTML=m.title;

document.getElementById("memoryDate").innerHTML=m.date;

typeWriter(
document.getElementById("memoryNote"),
m.note,
25
);

const photoBox=
document.getElementById("memoryPhotos");

photoBox.innerHTML="";

m.photos.forEach(photo=>{

const img=document.createElement("img");

img.src=photo;

photoBox.appendChild(img);

});

}

</script>

</body>
</html>
