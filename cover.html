
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Birthday Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ffd6e8,#ffeef6,#ffffff);
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

/* Main Card */

.container{
width:90%;
max-width:430px;
padding:25px;
text-align:center;

background:rgba(255,255,255,0.25);
backdrop-filter:blur(15px);

border-radius:30px;

box-shadow:
0 0 30px rgba(255,105,180,.3);

z-index:100;
}

/* Photo */

.cover-photo{
width:260px;
height:260px;
object-fit:cover;

border-radius:25px;

border:6px solid white;

box-shadow:
0 0 30px pink;
}

/* Text */

.title{
margin-top:18px;
font-size:26px;
color:#ff4f96;
}

.subtitle{
margin-top:10px;
font-size:14px;
color:#666;
}

/* Password */

input{
width:100%;
padding:14px;
margin-top:22px;

border:none;
outline:none;

border-radius:15px;

font-size:16px;
text-align:center;
}

button{
padding:14px 28px;
margin-top:15px;

border:none;
border-radius:30px;

background:#ff69b4;
color:white;

cursor:pointer;
font-size:16px;

transition:.3s;
}

button:hover{
transform:scale(1.05);
}

/* Music Button */

.music-btn{
position:absolute;
top:20px;
right:20px;
z-index:200;
}

/* Floating Items */

.float{
position:absolute;
pointer-events:none;
animation:floatUp linear forwards;
}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-120vh);
opacity:0;
}

}

#msg{
margin-top:15px;
font-weight:bold;
color:#ff4f96;
}

</style>
</head>

<body>

<button class="music-btn" onclick="toggleMusic()">
🎵 Play Music
</button>

<div class="container">

<img src="IMG20260602184207.jpg" class="cover-photo">

<h1 class="title">
🔒 Secret Birthday Portal
</h1>

<p class="subtitle">
A magical surprise awaits someone special...
</p>

<input
type="password"
id="password"
placeholder="Enter Password">

<button onclick="unlockPortal()">
Unlock The Magic ❤️
</button>

<div id="msg"></div>

</div>

<script>
let musicPlaying = false;

function toggleMusic(){

const music =
document.getElementById("bgMusic");

const btn =
document.querySelector(".music-btn");

if(!musicPlaying){

music.play();

btn.innerHTML =
"⏸ Pause Music";

musicPlaying = true;

}else{

music.pause();

btn.innerHTML =
"🎵 Play Music";

musicPlaying = false;

}

}

/* Password */

function unlockPortal(){

let pass =
document.getElementById("password").value;

if(pass==="23112009"){

document.getElementById("bgMusic").play();

document.getElementById("msg").innerHTML=
"✨ Access Granted ✨";

setTimeout(()=>{
window.location.href="page2.html";
},2000);

}
else{

document.getElementById("msg").innerHTML=
"❌ Wrong Password";

}

}

/* Hearts */

function createHeart(){

const e=document.createElement("div");

e.className="float";

e.innerHTML="❤️";

e.style.left=Math.random()*100+"vw";
e.style.bottom="-50px";

e.style.fontSize=
(20+Math.random()*25)+"px";

e.style.animationDuration=
(5+Math.random()*5)+"s";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},10000);

}

setInterval(createHeart,300);

/* Flowers */

const flowers=[
"🌹","🌸","🌺","🌷","💐"
];

function createFlower(){

const e=document.createElement("div");

e.className="float";

e.innerHTML=
flowers[Math.floor(Math.random()*flowers.length)];

e.style.left=Math.random()*100+"vw";
e.style.bottom="-50px";

e.style.fontSize="30px";

e.style.animationDuration=
(6+Math.random()*4)+"s";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},10000);

}

setInterval(createFlower,500);

/* Balloons */

function createBalloon(){

const e=document.createElement("div");

e.className="float";

e.innerHTML="🎈";

e.style.left=Math.random()*100+"vw";
e.style.bottom="-80px";

e.style.fontSize=
(40+Math.random()*20)+"px";

e.style.animationDuration=
(8+Math.random()*5)+"s";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},15000);

}

setInterval(createBalloon,700);

/* Sparkles */

function createSparkle(){

const e=document.createElement("div");

e.innerHTML="✨";

e.style.position="absolute";

e.style.left=Math.random()*100+"vw";
e.style.top=Math.random()*100+"vh";

e.style.fontSize="20px";

document.body.appendChild(e);

setTimeout(()=>{
e.remove();
},2000);

}

setInterval(createSparkle,200);

</script>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>
</body>
</html>
